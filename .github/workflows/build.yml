name: Build Nova APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager             "platform-tools"             "platforms;android-35"             "build-tools;35.0.0"             "cmake;3.22.1"             "ndk;28.2.13676358"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Remove stale generated local files
        run: |
          rm -f android/local.properties
          rm -f .flutter-plugins-dependencies
          rm -f pubspec.lock
          rm -f android/app/src/main/java/io/flutter/plugins/GeneratedPluginRegistrant.java
          chmod +x android/gradlew

      - name: Get dependencies
        run: flutter pub get

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --debug -v 2>&1 | tee build_debug.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-debug-log
          path: build_debug.log

      - name: Find APK
        if: success()
        run: find . -name "*.apk" -type f -print

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nova-debug-apk
          path: |
            **/*.apk
