name: nova
description: "Nova voice-first offline assistant."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  file_picker: ^10.3.10
  flutter_tts: ^4.2.5
  shared_preferences: ^2.5.3
  path_provider: ^2.1.5
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icon.png"
  adaptive_icon_background: "#F7F0EC"
  adaptive_icon_foreground: "assets/icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
    - assets/icon_foreground.png
    - assets/offline_corpus_json/
    - assets/voice_profiles/
